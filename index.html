<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Kickers Leer">
<title>FC Kickers Leer</title>
<style>
:root{--green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;--red:#E24B4A;--red-light:#FCEBEB;--amber:#BA7517;--amber-light:#FAEEDA;--bg:#F4F4F2;--card:#FFFFFF;--text:#1a1a1a;--muted:#6b6b6b;--border:rgba(0,0,0,0.10);--radius:12px;}
@media(prefers-color-scheme:dark){:root{--bg:#111;--card:#1e1e1e;--text:#f0f0f0;--muted:#999;--border:rgba(255,255,255,0.10);--green-light:#04342C;--red-light:#501313;--amber-light:#412402;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--green);color:#fff;padding:16px 16px 12px;position:sticky;top:0;z-index:10;}
header h1{font-size:17px;font-weight:600;}
header p{font-size:12px;opacity:0.8;margin-top:2px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 12px 0;}
.stat{background:var(--card);border-radius:10px;padding:10px 8px;text-align:center;}
.stat .n{font-size:26px;font-weight:600;}
.stat .l{font-size:11px;color:var(--muted);margin-top:1px;}
.stat.da .n{color:var(--green);}
.stat.ab .n{color:var(--red);}
.stat.en .n{color:var(--amber);}
.sessions-wrap{padding:12px 12px 0;}
.sessions{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.sessions::-webkit-scrollbar{display:none;}
.sess-btn{border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;background:var(--card);color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.sess-btn.active{background:var(--green);border-color:var(--green);color:#fff;font-weight:600;}
.add-sess-btn{border:1px dashed var(--border);border-radius:20px;padding:6px 14px;font-size:13px;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:14px 16px 6px;}
.player-list{display:flex;flex-direction:column;gap:6px;padding:0 12px;}
.player-row{background:var(--card);border-radius:var(--radius);padding:10px 12px;display:flex;align-items:center;gap:10px;border:1px solid var(--border);}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--muted);flex-shrink:0;}
.pname{flex:1;font-size:14px;font-weight:500;}
.status-btns{display:flex;gap:4px;}
.sb{border:1px solid var(--border);border-radius:8px;padding:6px 9px;font-size:12px;cursor:pointer;background:transparent;color:var(--muted);font-weight:500;}
.sb.da{background:var(--green-light);border-color:var(--green);color:var(--green-dark);}
.sb.ab{background:var(--red-light);border-color:var(--red);color:var(--red);}
.sb.en{background:var(--amber-light);border-color:var(--amber);color:var(--amber);}
.add-player-wrap{padding:14px 12px 4px;display:flex;gap:6px;}
.add-player-wrap input{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;background:var(--card);color:var(--text);}
.add-player-wrap button{border:none;border-radius:10px;padding:10px 16px;font-size:18px;background:var(--green);color:#fff;cursor:pointer;}
.export-wrap{padding:16px 12px 32px;}
.export-btn{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:13px;font-size:15px;background:var(--card);color:var(--text);cursor:pointer;font-weight:500;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<header>
  <h1>&#x26BD; FC Kickers Leer</h1>
  <p id="session-label">Vorbereitung 26/27 &middot; Termin w&auml;hlen</p>
</header>
<div class="stats">
  <div class="stat da"><div class="n" id="cnt-da">0</div><div class="l">Dabei</div></div>
  <div class="stat ab"><div class="n" id="cnt-ab">0</div><div class="l">Fehlt</div></div>
  <div class="stat en"><div class="n" id="cnt-en">0</div><div class="l">Entsch.</div></div>
</div>
<div class="sessions-wrap"><div class="sessions" id="sessions-bar"></div></div>
<div class="section-label">Spieler</div>
<div class="player-list" id="player-list"></div>
<div class="section-label">Trainerstab &amp; Betreuer</div>
<div class="player-list" id="staff-list"></div>
<div class="add-player-wrap">
  <input id="new-name" placeholder="Spieler hinzuf&uuml;gen..." />
  <button onclick="addPlayer()">+</button>
</div>
<div class="export-wrap">
  <button class="export-btn" onclick="exportList()">&#x1F4CB; Liste kopieren</button>
</div>
<div class="toast" id="toast"></div>

<script>
var rawDates=[46199,46200,46201,46204,46206,46208,46209,46211,46213,46215,46216,46218,46220,46222,46223,46225,46227];
function fmtDate(s){var d=new Date((s-25569)*86400*1000);return d.toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit"});}
var sessions=rawDates.map(function(s){return {label:fmtDate(s)};});
var curSess=0;

var defaultPlayers=["John Lucker","Mirco Behle","S\u00f6ren Bu\u00df","Erhan Colak","Marvin Dunayski","Jann Melcher","Mo Juma","Khaled Algarad","Ridvan Karakurt","Timo L\u00fcdemann","Aron M\u00fcseler","Noah Omar-Diriye","Gerrit Remmers","Jonas Weber","Manuel Westmark","Passo Wagner","Rojhat \u00d6zdemir"];
var defaultStaff=["Basti Fischer","Holger Dunayski","Micha","Christian"];

var players=defaultPlayers.map(function(n){return {name:n,status:{}};});
var staff=defaultStaff.map(function(n){return {name:n,status:{}};});

function tryLoad(){
  try{
    var p=localStorage.getItem("kickers_p");
    var s=localStorage.getItem("kickers_s");
    if(p){var pp=JSON.parse(p);if(pp&&pp.length>0)players=pp;}
    if(s){var ss=JSON.parse(s);if(ss&&ss.length>0)staff=ss;}
  }catch(e){}
}

function trySave(){
  try{localStorage.setItem("kickers_p",JSON.stringify(players));localStorage.setItem("kickers_s",JSON.stringify(staff));}catch(e){}
}

function initials(n){return n.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();}

function toggle(arr,i,val){
  arr[i].status[curSess]=(arr[i].status[curSess]===val?"":val);
  trySave();render();
}
function setP(i,v){toggle(players,i,v);}
function setS(i,v){toggle(staff,i,v);}

function renderList(id,arr,fn){
  var el=document.getElementById(id);
  var html="";
  for(var i=0;i<arr.length;i++){
    var st=arr[i].status[curSess]||"";
    html+='<div class="player-row">'
      +'<div class="avatar">'+initials(arr[i].name)+'</div>'
      +'<div class="pname">'+arr[i].name+'</div>'
      +'<div class="status-btns">'
      +'<button class="sb'+(st==="da"?" da":"')+'" onclick="'+fn+'('+i+',\'da\')">&#x2713; Da</button>'
      +'<button class="sb'+(st==="en"?" en":"'")+'" onclick="'+fn+'('+i+',\'en\')">Entsch.</button>'
      +'<button class="sb'+(st==="ab"?" ab":"'")+'" onclick="'+fn+'('+i+',\'ab\')">&#x2715; Fehlt</button>'
      +'</div></div>';
  }
  el.innerHTML=html;
}

function render(){
  renderList("player-list",players,"setP");
  renderList("staff-list",staff,"setS");
  var all=players.concat(staff);
  var da=0,ab=0,en=0;
  for(var i=0;i<all.length;i++){
    var st=all[i].status[curSess]||"";
    if(st==="da")da++;else if(st==="ab")ab++;else if(st==="en")en++;
  }
  document.getElementById("cnt-da").textContent=da;
  document.getElementById("cnt-ab").textContent=ab;
  document.getElementById("cnt-en").textContent=en;
  buildBar();
}

function buildBar(){
  var bar=document.getElementById("sessions-bar");
  var html="";
  for(var i=0;i<sessions.length;i++){
    html+='<button class="sess-btn'+(i===curSess?" active":"")+'" onclick="switchSession('+i+')">'+sessions[i].label+'</button>';
  }
  bar.innerHTML=html;
  var add=document.createElement("button");
  add.className="add-sess-btn";
  add.textContent="+ Termin";
  add.onclick=function(){
    var lbl=prompt("Datum eingeben (z.B. Mo. 14.07.):");
    if(!lbl)return;
    sessions.push({label:lbl});
    switchSession(sessions.length-1);
  };
  bar.appendChild(add);
}

function switchSession(idx){
  curSess=idx;
  document.getElementById("session-label").textContent="Vorbereitung 26/27 \u00b7 "+sessions[idx].label;
  render();
}

function addPlayer(){
  var name=document.getElementById("new-name").value.trim();
  if(!name)return;
  players.push({name:name,status:{}});
  document.getElementById("new-name").value="";
  trySave();render();
  showToast(name+" hinzugef\u00fcgt");
}

function exportList(){
  var s=sessions[curSess];
  var da=[],ab=[],en=[];
  for(var i=0;i<players.length;i++){
    var st=players[i].status[curSess]||"";
    if(st==="da")da.push(players[i].name);
    else if(st==="ab")ab.push(players[i].name);
    else if(st==="en")en.push(players[i].name);
  }
  var txt="FC Kickers Leer \u2013 Vorbereitung 26/27\n"+s.label+"\n\n\u2705 Dabei ("+da.length+"):\n"+(da.join("\n")||"\u2014")+"\n\n\u274C Fehlt ("+ab.length+"):\n"+(ab.join("\n")||"\u2014")+"\n\n\u26A0\uFE0F Entschuldigt ("+en.length+"):\n"+(en.join("\n")||"\u2014");
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){showToast("Kopiert!");}).catch(function(){fallback(txt);});
  }else{fallback(txt);}
}

function fallback(txt){
  var ta=document.createElement("textarea");
  ta.value=txt;ta.style.cssText="position:fixed;top:0;left:0;opacity:0;";
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand("copy");showToast("Kopiert!");}catch(e){alert(txt);}
  document.body.removeChild(ta);
}

function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2500);
}

tryLoad();
switchSession(0);
</script>
</body>
</html>
